<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
  <!-- Definitions for gradients and filters -->
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040712" />
      <stop offset="50%" stop-color="#0a122c" />
      <stop offset="100%" stop-color="#040712" />
    </linearGradient>

    <!-- Glowing Circle 1 Gradient -->
    <radialGradient id="glow-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0" />
    </radialGradient>

    <!-- Glowing Circle 2 Gradient -->
    <radialGradient id="glow-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
    </radialGradient>

    <!-- Text Gradient -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#4facfe" />
      <stop offset="100%" stop-color="#00f2fe" />
    </linearGradient>
    
    <!-- Blur Filter for glassmorphism/nebula glow -->
    <filter id="blur-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40" />
    </filter>
  </defs>

  <!-- Inline CSS Styles & Animations -->
  <style>
    @keyframes float-slow {
      0% { transform: translate(0px, 0px) scale(1); }
      50% { transform: translate(40px, -20px) scale(1.1); }
      100% { transform: translate(0px, 0px) scale(1); }
    }

    @keyframes float-reverse {
      0% { transform: translate(0px, 0px) scale(1.1); }
      50% { transform: translate(-30px, 30px) scale(0.9); }
      100% { transform: translate(0px, 0px) scale(1.1); }
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 0.8; filter: drop-shadow(0 0 5px rgba(6, 182, 212, 0.6)); }
      50% { opacity: 1; filter: drop-shadow(0 0 20px rgba(6, 182, 212, 0.9)); }
    }

    @keyframes draw-line {
      0% { stroke-dashoffset: 600; }
      100% { stroke-dashoffset: 0; }
    }

    @keyframes fade-in-up {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes float-item {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(5deg); }
    }

    @keyframes float-item-delayed {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(-8deg); }
    }

    .nebula-cyan {
      animation: float-slow 15s infinite ease-in-out;
      transform-origin: center;
    }

    .nebula-blue {
      animation: float-reverse 18s infinite ease-in-out;
      transform-origin: center;
    }

    .main-title {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 800;
      font-size: 42px;
      fill: url(#text-grad);
      animation: pulse-glow 4s infinite ease-in-out;
    }

    .subtitle {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 500;
      font-size: 16px;
      fill: #94a3b8;
      letter-spacing: 2px;
      opacity: 0;
      animation: fade-in-up 1s forwards 0.5s;
    }

    .badge-text {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 600;
      font-size: 12px;
      fill: #06b6d4;
      letter-spacing: 1px;
    }

    .animated-line {
      stroke-dasharray: 600;
      stroke-dashoffset: 600;
      animation: draw-line 2.5s forwards ease-in-out;
    }

    .floating-code-element {
      font-family: 'Courier New', monospace;
      font-size: 18px;
      fill: #1e293b;
      opacity: 0.3;
      user-select: none;
    }

    .floating-icon {
      animation: float-item 6s infinite ease-in-out;
    }
    
    .floating-icon-delayed {
      animation: float-item-delayed 8s infinite ease-in-out;
    }
  </style>

  <!-- Background base -->
  <rect width="800" height="300" fill="url(#bg-grad)" />

  <!-- Animated Glowing Nebulas for moving background -->
  <g filter="url(#blur-filter)">
    <circle class="nebula-cyan" cx="150" cy="100" r="160" fill="url(#glow-cyan)" />
    <circle class="nebula-blue" cx="650" cy="200" r="180" fill="url(#glow-blue)" />
    <circle class="nebula-cyan" cx="400" cy="250" r="120" fill="url(#glow-cyan)" />
  </g>

  <!-- Background decorative floating code items -->
  <text class="floating-code-element floating-icon" x="80" y="70">&lt;div&gt;</text>
  <text class="floating-code-element floating-icon-delayed" x="680" y="80">const app = express();</text>
  <text class="floating-code-element floating-icon" x="120" y="240">git commit -m "success"</text>
  <text class="floating-code-element floating-icon-delayed" x="620" y="230">&lt;/&gt;</text>
  <text class="floating-code-element floating-icon" x="480" y="60">{ ...state }</text>

  <!-- Center Content Group -->
  <g transform="translate(400, 150)" text-anchor="middle">
    <!-- Mini Tagline / Category -->
    <g transform="translate(0, -60)" opacity="0" style="animation: fade-in-up 1s forwards 0.2s;">
      <rect x="-95" y="-12" width="190" height="24" rx="12" fill="#0c192c" stroke="#1e293b" stroke-width="1" />
      <text class="badge-text" y="4" text-anchor="middle">FOUNDER &amp; DEVELOPER</text>
    </g>

    <!-- Glowing Main Title -->
    <text class="main-title" y="0">KUNAL CHOUDHARY</text>

    <!-- Animated Accent Line below Title -->
    <line class="animated-line" x1="-150" y1="18" x2="150" y2="18" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" />

    <!-- Subtitle -->
    <text class="subtitle" y="45">KC SOFTWARE SOLUTIONS</text>
  </g>

  <!-- Animated Border / Grid Elements for high-tech look -->
  <rect x="15" y="15" width="770" height="270" rx="8" fill="none" stroke="#1e293b" stroke-dasharray="10 15" stroke-opacity="0.5" />
</svg>
